<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semear Paroquial - Login</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-gold-strong: #8a5b16;
            --brand-gold: #b98a35;
            --brand-gold-soft: #f1cf72;
            --brand-cream: #fbf5e9;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(155deg, #fbf5e9 0%, #f3e6cc 46%, #efe5d8 100%);
            padding: 16px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1050;
            padding: 16px;
        }

        .dialog-card {
            width: 100%;
            max-width: 520px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.2);
        }

        .brand-top {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 14px;
        }

        .brand-mark {
            width: 110px;
            height: 110px;
            margin-bottom: 14px;
            display: grid;
            place-items: center;
            border-radius: 32px;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.96), rgba(249, 240, 220, 0.92));
            box-shadow: 0 18px 40px rgba(185, 138, 53, 0.16);
            border: 1px solid rgba(185, 138, 53, 0.18);
        }

        .brand-mark img {
            width: 82px;
            height: 82px;
            display: block;
            object-fit: contain;
            mix-blend-mode: multiply;
            filter: contrast(1.08) saturate(1.04);
        }

        .brand-top .subtitle {
            font-size: 0.9rem;
            letter-spacing: 0.14em;
            font-weight: 600;
            text-transform: uppercase;
            color: #8a6a36;
            margin: 0;
        }

        .btn-brand-login {
            border: 0;
            color: #fff;
            font-weight: 600;
            background: linear-gradient(135deg, var(--brand-gold-soft) 0%, var(--brand-gold) 52%, var(--brand-gold-strong) 100%);
            box-shadow: 0 12px 24px rgba(138, 91, 22, 0.18);
            transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
        }

        .btn-brand-login:hover,
        .btn-brand-login:focus,
        .btn-brand-login:active {
            color: #fff;
            background: linear-gradient(135deg, #f4d983 0%, #c99638 52%, #8a5b16 100%);
            box-shadow: 0 14px 28px rgba(138, 91, 22, 0.22);
            transform: translateY(-1px);
        }

        .btn-brand-login:focus-visible {
            box-shadow: 0 0 0 0.25rem rgba(185, 138, 53, 0.25), 0 14px 28px rgba(138, 91, 22, 0.22);
        }

        .btn-brand-login:disabled {
            color: rgba(255, 255, 255, 0.82);
            background: linear-gradient(135deg, #d9bf85 0%, #c5a461 100%);
            box-shadow: none;
            transform: none;
        }

        .login-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #7b7164;
            font-size: 0.86rem;
            margin: 18px 0;
        }

        .login-divider::before,
        .login-divider::after {
            content: "";
            height: 1px;
            flex: 1;
            background: #eadfce;
        }

        .btn-google-login {
            min-height: 42px;
            border-color: #d7dce2;
            color: #263238;
            font-weight: 600;
            background: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google-login:hover,
        .btn-google-login:focus {
            border-color: #b8c0ca;
            background: #f8fafc;
            color: #111827;
        }

        .google-mark {
            width: 18px;
            height: 18px;
            flex: 0 0 auto;
        }
    </style>
</head>
<body>
    <div id="app" class="login-card">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <div class="brand-top">
                    <div class="brand-mark" aria-hidden="true">
                        <img src="/assets/logo-login-oficial.png" alt="Semear Paroquial">
                    </div>
                    <p class="subtitle">Semear Paroquial</p>
                </div>
                <h3 class="mb-1 text-center">Acessar Sistema</h3>
                <p class="text-muted mb-4 text-center">Entre com sua conta.</p>
                <div class="d-grid mb-3">
                    <button type="button" class="btn btn-google-login" :disabled="loadingGoogle" @click="entrarComGoogle">
                        <svg class="google-mark" viewBox="0 0 18 18" aria-hidden="true">
                            <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.91c1.7-1.57 2.69-3.88 2.69-6.62z"/>
                            <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.91-2.26c-.81.54-1.84.86-3.05.86-2.35 0-4.34-1.59-5.05-3.72H.94v2.33A9 9 0 0 0 9 18z"/>
                            <path fill="#FBBC05" d="M3.95 10.7A5.41 5.41 0 0 1 3.67 9c0-.59.1-1.16.28-1.7V4.97H.94A9 9 0 0 0 0 9c0 1.45.35 2.82.94 4.03l3.01-2.33z"/>
                            <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.9 11.43 0 9 0A9 9 0 0 0 .94 4.97L3.95 7.3C4.66 5.17 6.65 3.58 9 3.58z"/>
                        </svg>
                        <span>{{ loadingGoogle ? 'Abrindo Google...' : 'Entrar com Google' }}</span>
                    </button>
                </div>
                <div class="login-divider">ou</div>
                <form @submit.prevent="entrarComSenha" class="mb-3">
                    <div class="mb-2">
                        <label class="form-label">Usuário (e-mail)</label>
                        <input class="form-control" type="email" v-model.trim="username" required autocomplete="username">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Senha</label>
                        <input class="form-control" type="password" v-model="senha" required autocomplete="current-password">
                    </div>
                    <div class="d-grid">
                        <button class="btn btn-brand-login" :disabled="loadingSenha">{{ loadingSenha ? 'Entrando...' : 'Entrar com usuário e senha' }}</button>
                    </div>
                </form>
            </div>
        </div>

        <div v-if="popup.aberto" class="overlay">
            <div class="dialog-card p-4">
                <h5 class="mb-2">{{ popup.titulo }}</h5>
                <p class="mb-2">{{ popup.mensagem }}</p>
                <p v-if="popup.motivo" class="text-muted mb-3"><strong>Motivo:</strong> {{ popup.motivo }}</p>
                <div class="d-flex justify-content-end">
                    <button class="btn btn-primary" @click="popup.aberto=false">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                const params = new URLSearchParams(window.location.search || '');
                const next = (params.get('next') || '').trim();
                return {
                    next,
                    username: '',
                    senha: '',
                    loadingSenha: false,
                    loadingGoogle: false,
                    popup: { aberto: false, titulo: '', mensagem: '', motivo: '' }
                };
            },
            mounted() {
                this.exibirResultadoGoogle();
            },
            methods: {
                entrarComGoogle() {
                    this.loadingGoogle = true;
                    const suffix = this.next ? `?next=${encodeURIComponent(this.next)}` : '';
                    window.location.href = `/api/auth/google${suffix}`;
                },
                async entrarComSenha() {
                    this.loadingSenha = true;
                    try {
                        const res = await fetch('/api/auth/login' + (this.next ? `?next=${encodeURIComponent(this.next)}` : ''), {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                username: this.username,
                                senha: this.senha,
                                next: this.next || undefined
                            })
                        });
                        const data = await res.json().catch(() => ({}));
                        if (!res.ok) {
                            this.abrirPopup('Não foi possível entrar', data.error || 'Credenciais inválidas.');
                            return;
                        }
                        const destino = String(data.redirect_to || '').trim() || 'https://ejc.semearparoquial.com.br/dashboard';
                        window.location.href = destino;
                    } catch (_) {
                        this.abrirPopup('Não foi possível entrar', 'Erro ao conectar com o servidor.');
                    } finally {
                        this.loadingSenha = false;
                    }
                },
                exibirResultadoGoogle() {
                    const params = new URLSearchParams(window.location.search || '');
                    const status = String(params.get('google') || '').trim();
                    if (!status) return;

                    const mensagens = {
                        'nao-configurado': 'Login com Google ainda não está configurado no servidor.',
                        'falha': 'Não foi possível concluir a autenticação com o Google.',
                        'email-invalido': 'A conta Google não retornou um e-mail válido.',
                        'multi-sistema': 'Este usuário possui acesso a mais de um módulo. Acesse pelo link direto do sistema desejado.',
                        'nao-cadastrado': 'Este e-mail do Google não está cadastrado no Semear.',
                        'multi-tenant': 'Este e-mail está vinculado a mais de um EJC. Contate o administrador.',
                        'erro-servidor': 'Erro ao processar o login com Google.'
                    };

                    this.abrirPopup('Não foi possível entrar com Google', mensagens[status] || 'Tente novamente em alguns instantes.');
                },
                abrirPopup(titulo, mensagem, motivo) {
                    this.popup = { aberto: true, titulo: titulo || 'Aviso', mensagem: mensagem || '', motivo: motivo || '' };
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
