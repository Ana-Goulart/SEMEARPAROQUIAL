<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semear Paroquial - Login</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-gold-strong: #8a5b16;
            --brand-gold: #b98a35;
            --brand-gold-soft: #f1cf72;
            --brand-cream: #fbf5e9;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(155deg, #fbf5e9 0%, #f3e6cc 46%, #efe5d8 100%);
            padding: 16px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1050;
            padding: 16px;
        }

        .dialog-card {
            width: 100%;
            max-width: 520px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.2);
        }

        .brand-top {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 14px;
        }

        .brand-mark {
            width: 110px;
            height: 110px;
            margin-bottom: 14px;
            display: grid;
            place-items: center;
            border-radius: 32px;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.96), rgba(249, 240, 220, 0.92));
            box-shadow: 0 18px 40px rgba(185, 138, 53, 0.16);
            border: 1px solid rgba(185, 138, 53, 0.18);
        }

        .brand-mark img {
            width: 82px;
            height: 82px;
            display: block;
            object-fit: contain;
            mix-blend-mode: multiply;
            filter: contrast(1.08) saturate(1.04);
        }

        .brand-top .subtitle {
            font-size: 0.9rem;
            letter-spacing: 0.14em;
            font-weight: 600;
            text-transform: uppercase;
            color: #8a6a36;
            margin: 0;
        }

        .btn-brand-login {
            border: 0;
            color: #fff;
            font-weight: 600;
            background: linear-gradient(135deg, var(--brand-gold-soft) 0%, var(--brand-gold) 52%, var(--brand-gold-strong) 100%);
            box-shadow: 0 12px 24px rgba(138, 91, 22, 0.18);
            transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
        }

        .btn-brand-login:hover,
        .btn-brand-login:focus,
        .btn-brand-login:active {
            color: #fff;
            background: linear-gradient(135deg, #f4d983 0%, #c99638 52%, #8a5b16 100%);
            box-shadow: 0 14px 28px rgba(138, 91, 22, 0.22);
            transform: translateY(-1px);
        }

        .btn-brand-login:focus-visible {
            box-shadow: 0 0 0 0.25rem rgba(185, 138, 53, 0.25), 0 14px 28px rgba(138, 91, 22, 0.22);
        }

        .btn-brand-login:disabled {
            color: rgba(255, 255, 255, 0.82);
            background: linear-gradient(135deg, #d9bf85 0%, #c5a461 100%);
            box-shadow: none;
            transform: none;
        }
    </style>
</head>
<body>
    <div id="app" class="login-card">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <div class="brand-top">
                    <div class="brand-mark" aria-hidden="true">
                        <img src="/assets/logo-login-oficial.png" alt="Semear Paroquial">
                    </div>
                    <p class="subtitle">Semear Paroquial</p>
                </div>
                <h3 class="mb-1 text-center">Acessar Sistema</h3>
                <p class="text-muted mb-4 text-center">Entre com usuário e senha.</p>
                <form @submit.prevent="entrarComSenha" class="mb-3">
                    <div class="mb-2">
                        <label class="form-label">Usuário (e-mail)</label>
                        <input class="form-control" type="email" v-model.trim="username" required autocomplete="username">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Senha</label>
                        <input class="form-control" type="password" v-model="senha" required autocomplete="current-password">
                    </div>
                    <div class="d-grid">
                        <button class="btn btn-brand-login" :disabled="loadingSenha">{{ loadingSenha ? 'Entrando...' : 'Entrar com usuário e senha' }}</button>
                    </div>
                </form>
            </div>
        </div>

        <div v-if="popup.aberto" class="overlay">
            <div class="dialog-card p-4">
                <h5 class="mb-2">{{ popup.titulo }}</h5>
                <p class="mb-2">{{ popup.mensagem }}</p>
                <p v-if="popup.motivo" class="text-muted mb-3"><strong>Motivo:</strong> {{ popup.motivo }}</p>
                <div class="d-flex justify-content-end">
                    <button class="btn btn-primary" @click="popup.aberto=false">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                const params = new URLSearchParams(window.location.search || '');
                const next = (params.get('next') || '').trim();
                return {
                    next,
                    username: '',
                    senha: '',
                    loadingSenha: false,
                    popup: { aberto: false, titulo: '', mensagem: '', motivo: '' }
                };
            },
            mounted() {
                // Login somente por usuário e senha.
            },
            methods: {
                async entrarComSenha() {
                    this.loadingSenha = true;
                    try {
                        const res = await fetch('/api/auth/login' + (this.next ? `?next=${encodeURIComponent(this.next)}` : ''), {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                username: this.username,
                                senha: this.senha,
                                next: this.next || undefined
                            })
                        });
                        const data = await res.json().catch(() => ({}));
                        if (!res.ok) {
                            this.abrirPopup('Não foi possível entrar', data.error || 'Credenciais inválidas.');
                            return;
                        }
                        const destino = String(data.redirect_to || '').trim() || 'https://ejc.semearparoquial.com.br/dashboard';
                        window.location.href = destino;
                    } catch (_) {
                        this.abrirPopup('Não foi possível entrar', 'Erro ao conectar com o servidor.');
                    } finally {
                        this.loadingSenha = false;
                    }
                },
                abrirPopup(titulo, mensagem, motivo) {
                    this.popup = { aberto: true, titulo: titulo || 'Aviso', mensagem: mensagem || '', motivo: motivo || '' };
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
