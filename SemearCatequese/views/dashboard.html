<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Semear Catequese</title>
    <link rel="icon" type="image/png" href="/assets/logo-oficial.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <main>
            <div class="mb-4">
                <h3 class="mb-1">Dashboard</h3>
                <p class="text-muted mb-0">Resumo do módulo Catequese Infantil.</p>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-12 col-md-6 col-xl-4">
                    <div class="metric-card h-100">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="metric-title">Usuários Cadastrados</div>
                            <span class="badge bg-light text-dark" id="totalUsuarios">...</span>
                        </div>
                        <div class="metric-sub mt-2">Total de usuários no sistema.</div>
                        <div class="mt-3">
                            <a class="btn btn-sm btn-outline-primary" href="/usuarios">Gerenciar usuários</a>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-md-6 col-xl-4">
                    <div class="metric-card h-100">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="metric-title">Sistema</div>
                            <span class="badge bg-success-subtle text-success" id="statusSistema">Online</span>
                        </div>
                        <div class="metric-sub mt-2">Módulo pronto para o domínio catequese-infantil.semearparoquial.com.br:3004.</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/menu.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            injetarMenu('#app');
            ativarMenu('/dashboard');

            try {
                const res = await fetch('/api/usuarios');
                const data = await res.json();
                document.getElementById('totalUsuarios').textContent = Array.isArray(data) ? data.length : 0;
            } catch (err) {
                console.error(err);
                document.getElementById('totalUsuarios').textContent = 'Erro';
                document.getElementById('statusSistema').textContent = 'Instável';
                document.getElementById('statusSistema').className = 'badge bg-danger-subtle text-danger';
            }
        });
    </script>
</body>
</html>
