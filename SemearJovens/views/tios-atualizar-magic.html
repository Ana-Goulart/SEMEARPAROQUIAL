<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atualização Cadastral - Tios</title>
    <link rel="icon" type="image/png" href="/assets/logo-oficial.png">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/velzon-theme.css">
    <script src="/js/termos-uso-lgpd.js" defer></script>
    <style>
        body { min-height: 100vh; background: #f7f2e8; }
        .shell { max-width: 920px; }
        .brand-logo { width: 84px; height: 84px; object-fit: contain; }
        .section-title { color: #8a6a36; font-size: .82rem; font-weight: 700; text-transform: uppercase; }
        /* ---- Multiselect Restrição Alimentar ---- */
        .restricao-multiselect { display: flex; flex-direction: column; gap: 0.4rem; }
        .restricao-options-list { max-height: 140px; overflow-y: auto; border: 1px solid #e5d5bb; border-radius: 6px; padding: 4px 2px; background: #fff; }
        .restricao-option-item { display: flex; align-items: center; gap: 0.4rem; padding: 3px 8px; cursor: pointer; border-radius: 4px; font-size: 0.875rem; user-select: none; transition: background 0.12s; }
        .restricao-option-item:hover { background: #fff8ee; }
        .restricao-option-item.selecionada { background: #f4ede1; font-weight: 600; color: #6e5430; }
        .restricao-option-check { width: 14px; height: 14px; accent-color: #d9a650; flex-shrink: 0; }
        .restricao-chips { display: flex; flex-wrap: wrap; gap: 4px; }
        .restricao-chip { display: inline-flex; align-items: center; gap: 4px; background: #d9a650; color: #fff; border-radius: 999px; font-size: 0.78rem; padding: 2px 8px 2px 10px; font-weight: 600; box-shadow: 0 2px 6px rgba(217,166,80,0.28); }
        .restricao-chip-remove { background: none; border: none; padding: 0; line-height: 1; font-size: 0.85rem; color: rgba(255,255,255,0.8); cursor: pointer; }
        .restricao-chip-remove:hover { color: #fff; }
    </style>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#C9922A">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Semear Jovens">
    <link rel="apple-touch-icon" href="/assets/logo-oficial.png">
</head>
<body>
    <div id="app" class="container py-4 shell">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4 p-md-5">
                <div v-if="loading" class="text-center py-5"><div class="spinner-border text-primary"></div></div>
                <div v-else-if="erro" class="text-center py-5">
                    <img src="/assets/logo-oficial.png" class="brand-logo mb-3" alt="Semear Paroquial">
                    <h1 class="h4">Link indisponível</h1>
                    <p class="text-muted">{{ erro }}</p>
                </div>
                <div v-else-if="sucesso" class="text-center py-5">
                    <img src="/assets/logo-oficial.png" class="brand-logo mb-3" alt="Semear Paroquial">
                    <h1 class="h4">Cadastro atualizado</h1>
                    <p class="text-muted">Obrigado por atualizar os dados do casal.</p>
                </div>
                <template v-else>
                    <div class="text-center mb-4">
                        <img src="/assets/logo-oficial.png" class="brand-logo" alt="Semear Paroquial">
                        <h1 class="h4 mt-3 mb-1">Atualização cadastral dos tios</h1>
                        <p class="text-muted mb-0">{{ form.nome_tio || 'Tio' }} e {{ form.nome_tia || 'Tia' }}</p>
                    </div>

                    <form class="row g-3" @submit.prevent="enviar">
                        <div class="col-12">
                            <div class="section-title">Dados do tio</div>
                            <div class="form-check mt-2">
                                <input class="form-check-input" type="checkbox" id="check_tio_viuvo" v-model="form.tio_viuvo">
                                <label class="form-check-label" for="check_tio_viuvo">É viúvo/divorciado?</label>
                            </div>
                            <div v-if="form.tia_viuva" class="small text-muted mt-1">Os campos do tio são opcionais pois a tia está marcada como viúva/divorciada.</div>
                        </div>
                        <div class="col-md-6"><label class="form-label">Nome completo <span v-if="!form.tia_viuva">*</span></label><input class="form-control" v-model.trim="form.nome_tio" :required="!form.tia_viuva"></div>
                        <div class="col-md-3"><label class="form-label">Telefone <span v-if="!form.tia_viuva">*</span></label><input class="form-control" v-model="form.telefone_tio" @input="form.telefone_tio = formatarTelefone(form.telefone_tio)" :required="!form.tia_viuva" maxlength="14"></div>
                        <div class="col-md-3"><label class="form-label">CPF <span v-if="!form.tia_viuva">*</span></label><input class="form-control" v-model="form.cpf_tio" @input="form.cpf_tio = formatarCpf(form.cpf_tio)" :required="!form.tia_viuva" maxlength="14"></div>
                        <div class="col-md-4"><label class="form-label">Data de nascimento</label><input class="form-control" type="date" v-model="form.data_nascimento_tio"></div>
                        <div class="col-md-4"><label class="form-label">Tem deficiência?</label><select class="form-select" v-model="form.deficiencia_tio"><option :value="false">Não</option><option :value="true">Sim</option></select></div>
                        <div class="col-md-4" v-if="form.deficiencia_tio"><label class="form-label">Qual?</label><input class="form-control" v-model.trim="form.qual_deficiencia_tio"></div>
                        <div class="col-md-4"><label class="form-label">Restrições alimentares e alergias?</label><select class="form-select" v-model="form.restricao_alimentar_tio" @change="if (!form.restricao_alimentar_tio) { form.detalhes_restricao_tio = []; buscaRestricaoTio = ''; }"><option :value="false">Não</option><option :value="true">Sim</option></select></div>
                        <div class="col-md-8" v-if="form.restricao_alimentar_tio">
                            <label class="form-label">Qual restrição? (selecione uma ou mais)</label>
                            <div class="restricao-multiselect">
                                <input type="text" v-model="buscaRestricaoTio" class="form-control form-control-sm" placeholder="Buscar restrição...">
                                <div class="restricao-options-list">
                                    <label v-for="opcao in restricoesFiltradas(buscaRestricaoTio)" :key="opcao" class="restricao-option-item" :class="{ selecionada: normalizarRestricoes(form.detalhes_restricao_tio).includes(opcao) }">
                                        <input type="checkbox" class="restricao-option-check" :checked="normalizarRestricoes(form.detalhes_restricao_tio).includes(opcao)" @change="toggleRestricaoTio(opcao)">
                                        {{ opcao }}
                                    </label>
                                    <div v-if="!restricoesFiltradas(buscaRestricaoTio).length" class="px-2 py-1 text-muted small">Nenhuma opção encontrada</div>
                                    <label class="restricao-option-item" :class="{ selecionada: outrosRestricaoMarcadoTio }">
                                        <input type="checkbox" class="restricao-option-check" v-model="outrosRestricaoMarcadoTio">
                                        Outras
                                    </label>
                                </div>
                                <div v-if="outrosRestricaoMarcadoTio" class="d-flex gap-2 mt-1">
                                    <input type="text" v-model="outrosRestricaoTextoTio" class="form-control form-control-sm"
                                        placeholder="Especifique a restrição..." @keyup.enter="adicionarOutrosRestricaoTio">
                                    <button type="button" class="btn btn-sm btn-success" @click="adicionarOutrosRestricaoTio"
                                        :disabled="!String(outrosRestricaoTextoTio || '').trim()">Adicionar</button>
                                </div>
                                <div v-if="normalizarRestricoes(form.detalhes_restricao_tio).length" class="restricao-chips">
                                    <span v-for="item in normalizarRestricoes(form.detalhes_restricao_tio)" :key="item" class="restricao-chip">{{ item }}<button type="button" class="restricao-chip-remove" @click="toggleRestricaoTio(item)">×</button></span>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 pt-2">
                            <div class="section-title">Dados da tia</div>
                            <div class="form-check mt-2">
                                <input class="form-check-input" type="checkbox" id="check_tia_viuva" v-model="form.tia_viuva">
                                <label class="form-check-label" for="check_tia_viuva">É viúva/divorciada?</label>
                            </div>
                            <div v-if="form.tio_viuvo" class="small text-muted mt-1">Os campos da tia são opcionais pois o tio está marcado como viúvo/divorciado.</div>
                        </div>
                        <div class="col-md-6"><label class="form-label">Nome completo <span v-if="!form.tio_viuvo">*</span></label><input class="form-control" v-model.trim="form.nome_tia" :required="!form.tio_viuvo"></div>
                        <div class="col-md-3"><label class="form-label">Telefone <span v-if="!form.tio_viuvo">*</span></label><input class="form-control" v-model="form.telefone_tia" @input="form.telefone_tia = formatarTelefone(form.telefone_tia)" :required="!form.tio_viuvo" maxlength="14"></div>
                        <div class="col-md-3"><label class="form-label">CPF <span v-if="!form.tio_viuvo">*</span></label><input class="form-control" v-model="form.cpf_tia" @input="form.cpf_tia = formatarCpf(form.cpf_tia)" :required="!form.tio_viuvo" maxlength="14"></div>
                        <div class="col-md-4"><label class="form-label">Data de nascimento</label><input class="form-control" type="date" v-model="form.data_nascimento_tia"></div>
                        <div class="col-md-4"><label class="form-label">Tem deficiência?</label><select class="form-select" v-model="form.deficiencia_tia"><option :value="false">Não</option><option :value="true">Sim</option></select></div>
                        <div class="col-md-4" v-if="form.deficiencia_tia"><label class="form-label">Qual?</label><input class="form-control" v-model.trim="form.qual_deficiencia_tia"></div>
                        <div class="col-md-4"><label class="form-label">Restrições alimentares e alergias?</label><select class="form-select" v-model="form.restricao_alimentar_tia" @change="if (!form.restricao_alimentar_tia) { form.detalhes_restricao_tia = []; buscaRestricaoTia = ''; }"><option :value="false">Não</option><option :value="true">Sim</option></select></div>
                        <div class="col-md-8" v-if="form.restricao_alimentar_tia">
                            <label class="form-label">Qual restrição? (selecione uma ou mais)</label>
                            <div class="restricao-multiselect">
                                <input type="text" v-model="buscaRestricaoTia" class="form-control form-control-sm" placeholder="Buscar restrição...">
                                <div class="restricao-options-list">
                                    <label v-for="opcao in restricoesFiltradas(buscaRestricaoTia)" :key="opcao" class="restricao-option-item" :class="{ selecionada: normalizarRestricoes(form.detalhes_restricao_tia).includes(opcao) }">
                                        <input type="checkbox" class="restricao-option-check" :checked="normalizarRestricoes(form.detalhes_restricao_tia).includes(opcao)" @change="toggleRestricaoTia(opcao)">
                                        {{ opcao }}
                                    </label>
                                    <div v-if="!restricoesFiltradas(buscaRestricaoTia).length" class="px-2 py-1 text-muted small">Nenhuma opção encontrada</div>
                                    <label class="restricao-option-item" :class="{ selecionada: outrosRestricaoMarcadoTia }">
                                        <input type="checkbox" class="restricao-option-check" v-model="outrosRestricaoMarcadoTia">
                                        Outras
                                    </label>
                                </div>
                                <div v-if="outrosRestricaoMarcadoTia" class="d-flex gap-2 mt-1">
                                    <input type="text" v-model="outrosRestricaoTextoTia" class="form-control form-control-sm"
                                        placeholder="Especifique a restrição..." @keyup.enter="adicionarOutrosRestricaoTia">
                                    <button type="button" class="btn btn-sm btn-success" @click="adicionarOutrosRestricaoTia"
                                        :disabled="!String(outrosRestricaoTextoTia || '').trim()">Adicionar</button>
                                </div>
                                <div v-if="normalizarRestricoes(form.detalhes_restricao_tia).length" class="restricao-chips">
                                    <span v-for="item in normalizarRestricoes(form.detalhes_restricao_tia)" :key="item" class="restricao-chip">{{ item }}<button type="button" class="restricao-chip-remove" @click="toggleRestricaoTia(item)">×</button></span>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 pt-2"><div class="section-title">Dados do casal</div></div>
                        <div class="col-md-4"><label class="form-label">O casal possui carro?</label><select class="form-select" v-model="form.possui_carro"><option :value="false">Não</option><option :value="true">Sim</option></select></div>
                        <div class="col-md-6" v-if="form.origem_tipo === 'OUTRO_EJC'">
                            <label class="form-label">Encontro *</label>
                            <select class="form-select" v-model="form.outro_ejc_id" required>
                                <option value="">Selecione</option>
                                <option v-for="o in outrosEjcs" :key="o.id" :value="o.id">{{ o.paroquia }}{{ o.nome ? ` - ${o.nome}` : '' }}</option>
                            </select>
                        </div>
                        <div class="col-md-6" v-else>
                            <label class="form-label">Encontro *</label>
                            <select class="form-select" v-model="form.encontro_tipo" required>
                                <option value="">Selecione</option>
                                <option value="ECC">ECC</option>
                                <option value="ECNA">ECNA</option>
                            </select>
                        </div>
                        <div class="col-12 pt-2">
                            <div class="section-title">Foto do casal</div>
                            <div class="d-flex align-items-center gap-3 mt-2">
                                <div class="position-relative flex-shrink-0">
                                    <img :src="fotoPreview || form.foto_url || ('https://ui-avatars.com/api/?name=' + encodeURIComponent(((form.nome_tio || 'Tio') + ' e ' + (form.nome_tia || 'Tia')).trim()) + '&background=e9ecef&color=6c757d&size=120')"
                                        alt="Foto do casal"
                                        class="rounded border shadow-sm object-fit-cover"
                                        style="width: 90px; height: 90px;">
                                    <label class="position-absolute bottom-0 end-0 rounded-circle d-flex justify-content-center align-items-center shadow"
                                        style="width: 28px; height: 28px; cursor: pointer; transform: translate(15%, 15%); background: #d9a650; border: 1px solid #d9a650;"
                                        title="Selecionar foto">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="#8a5a14"><path d="M12 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7zm7-13h-1.83l-1.5-2H8.33l-1.5 2H5C3.35 2.5 2 3.85 2 5.5v13C2 20.15 3.35 21.5 5 21.5h14c1.65 0 3-1.35 3-3v-13c0-1.65-1.35-3-3-3zm-7 15a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/></svg>
                                        <input type="file" class="d-none" accept=".jpeg,.jpg,.png,.webp" @change="onFotoChange">
                                    </label>
                                </div>
                                <div class="small">
                                    <div v-if="!fotoFile && !form.foto_url" class="mb-1" style="color: #8a6a36;">⚠ A foto do casal é obrigatória.</div>
                                    <div v-else-if="fotoFile" class="text-success mb-1">✓ Foto selecionada.</div>
                                    <div v-else class="text-success mb-1">✓ Foto atual mantida.</div>
                                    <div class="text-muted">Clique no ícone de câmera para selecionar.<br>Formatos: JPG, PNG, WEBP (máx. 5MB).</div>
                                </div>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="p-3 border rounded bg-light">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="termos" v-model="form.aceite_termos" required>
                                    <label class="form-check-label" for="termos">Li e concordo com os termos de uso *</label>
                                </div>
                                <button class="btn btn-link btn-sm px-0 mt-2" type="button" onclick="abrirTermosUsoSemear()">Ler mais</button>
                            </div>
                        </div>
                        <div class="col-12 d-grid"><button class="btn btn-primary" :disabled="enviando">{{ enviando ? 'Salvando...' : 'Salvar atualização' }}</button></div>
                    </form>
                </template>
            </div>
        </div>
    </div>
    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    loading: true,
                    enviando: false,
                    erro: '',
                    sucesso: false,
                    outrosEjcs: [],
                    buscaRestricaoTio: '',
                    buscaRestricaoTia: '',
                    outrosRestricaoMarcadoTio: false,
                    outrosRestricaoTextoTio: '',
                    outrosRestricaoMarcadoTia: false,
                    outrosRestricaoTextoTia: '',
                    opcoesRestricaoAlimentar: [
                        'Alergia a amendoim',
                        'Alergia a castanhas (nozes, castanha-do-pará, amêndoa, avelã, pistache, caju)',
                        'Alergia a frutos do mar (camarão, caranguejo, lagosta, mariscos)',
                        'Alergia a peixes',
                        'Alergia a ovos',
                        'Alergia a soja',
                        'Alergia a trigo',
                        'Alergia a gergelim',
                        'APLV — Alergia à Proteína do Leite de Vaca',
                        'Mamão',
                        'Berinjela',
                        'Intolerante à lactose',
                        'Intolerante a glúten (Doença Celíaca)',
                        'Intolerante a frutose',
                        'Intolerante a histamina',
                        'Não come carne vermelha',
                        'Não come carne de porco',
                        'Não come frutos do mar',
                        'Não come peixe',
                        'Vegetariano (não come carnes)',
                        'Vegano (não come nenhum produto animal)',
                        'Ovolactovegetariano',
                        'Dieta Kosher (restrições religiosas judaicas)',
                        'Dieta Halal (restrições religiosas islâmicas)',
                        'Produtos de limpeza',
                        'Diabético (restrição de açúcar)',
                        'Hipertenso (restrição de sódio/sal)',
                        'Fenilcetonúria (PKU)',
                        'Doença de Crohn',
                        'Síndrome do intestino irritável',
                        'Refluxo gastroesofágico',
                        'Restrição de gordura (colesterol alto)'
                    ],
                    token: window.location.pathname.split('/').filter(Boolean).pop() || '',
                    form: { aceite_termos: false },
                    fotoFile: null,
                    fotoPreview: ''
                };
            },
            methods: {
                normalizarRestricoes(valor) {
                    if (Array.isArray(valor)) return valor.filter(Boolean).map(v => String(v).trim()).filter(Boolean);
                    if (!valor) return [];
                    const txt = String(valor).trim();
                    if (!txt) return [];
                    try { const p = JSON.parse(txt); if (Array.isArray(p)) return p.filter(Boolean).map(v => String(v).trim()).filter(Boolean); } catch (e) {}
                    return [txt];
                },
                restricoesFiltradas(busca) {
                    const q = (busca || '').toLowerCase().trim();
                    if (!q) return this.opcoesRestricaoAlimentar;
                    return this.opcoesRestricaoAlimentar.filter(o => o.toLowerCase().includes(q));
                },
                toggleRestricaoTio(opcao) {
                    const arr = this.normalizarRestricoes(this.form.detalhes_restricao_tio);
                    const idx = arr.indexOf(opcao);
                    if (idx === -1) arr.push(opcao); else arr.splice(idx, 1);
                    this.form.detalhes_restricao_tio = arr;
                    this.form.restricao_alimentar_tio = arr.length > 0;
                },
                toggleRestricaoTia(opcao) {
                    const arr = this.normalizarRestricoes(this.form.detalhes_restricao_tia);
                    const idx = arr.indexOf(opcao);
                    if (idx === -1) arr.push(opcao); else arr.splice(idx, 1);
                    this.form.detalhes_restricao_tia = arr;
                    this.form.restricao_alimentar_tia = arr.length > 0;
                },
                adicionarOutrosRestricaoTio() {
                    const texto = String(this.outrosRestricaoTextoTio || '').trim();
                    if (!texto) return;
                    const arr = this.normalizarRestricoes(this.form.detalhes_restricao_tio);
                    if (!arr.includes(texto)) arr.push(texto);
                    this.form.detalhes_restricao_tio = arr;
                    this.form.restricao_alimentar_tio = true;
                    this.outrosRestricaoTextoTio = '';
                    this.outrosRestricaoMarcadoTio = false;
                },
                adicionarOutrosRestricaoTia() {
                    const texto = String(this.outrosRestricaoTextoTia || '').trim();
                    if (!texto) return;
                    const arr = this.normalizarRestricoes(this.form.detalhes_restricao_tia);
                    if (!arr.includes(texto)) arr.push(texto);
                    this.form.detalhes_restricao_tia = arr;
                    this.form.restricao_alimentar_tia = true;
                    this.outrosRestricaoTextoTia = '';
                    this.outrosRestricaoMarcadoTia = false;
                },
                digits(v) { return String(v || '').replace(/\D/g, ''); },
                formatarCpf(v) { const d = this.digits(v).slice(0, 11); if (d.length <= 3) return d; if (d.length <= 6) return `${d.slice(0,3)}.${d.slice(3)}`; if (d.length <= 9) return `${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6)}`; return `${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6,9)}-${d.slice(9)}`; },
                formatarTelefone(v) { const d = this.digits(v).slice(0, 11); if (d.length <= 2) return d ? `(${d}` : ''; if (d.length <= 7) return `(${d.slice(0,2)})${d.slice(2)}`; return `(${d.slice(0,2)})${d.slice(2,7)}-${d.slice(7)}`; },
                onFotoChange(e) {
                    const file = e.target.files && e.target.files[0] ? e.target.files[0] : null;
                    if (file && file.size > 5 * 1024 * 1024) {
                        alert('A foto é muito grande. Envie uma imagem com até 5 MB.');
                        e.target.value = '';
                        this.fotoFile = null;
                        this.fotoPreview = '';
                        return;
                    }
                    this.fotoFile = file;
                    this.fotoPreview = file ? URL.createObjectURL(file) : '';
                },
                async carregar() {
                    try {
                        const res = await fetch(`/api/atualizacoes-cadastro-public/tios/${encodeURIComponent(this.token)}`);
                        const data = await res.json().catch(() => ({}));
                        if (!res.ok) throw new Error(data.error || 'Link inválido.');
                        this.outrosEjcs = data.outros_ejcs || [];
                        this.form = { ...(data.casal || {}), aceite_termos: false };
                        this.form.detalhes_restricao_tio = this.normalizarRestricoes(this.form.detalhes_restricao_tio);
                        this.form.detalhes_restricao_tia = this.normalizarRestricoes(this.form.detalhes_restricao_tia);
                        this.form.telefone_tio = this.formatarTelefone(this.form.telefone_tio);
                        this.form.telefone_tia = this.formatarTelefone(this.form.telefone_tia);
                        this.form.cpf_tio = this.formatarCpf(this.form.cpf_tio);
                        this.form.cpf_tia = this.formatarCpf(this.form.cpf_tia);
                        this.form.possui_carro = !!(this.form.possui_carro || this.form.possui_carro_tio || this.form.possui_carro_tia);
                        this.form.possui_carro_tio = this.form.possui_carro;
                        this.form.possui_carro_tia = this.form.possui_carro;
                    } catch (err) { this.erro = err.message || 'Não foi possível abrir o formulário.'; }
                    finally { this.loading = false; }
                },
                async enviar() {
                    if (!this.form.tia_viuva && this.digits(this.form.cpf_tio).length !== 11) { alert('Informe CPF com 11 dígitos para o tio.'); return; }
                    if (!this.form.tio_viuvo && this.digits(this.form.cpf_tia).length !== 11) { alert('Informe CPF com 11 dígitos para a tia.'); return; }
                    if (!this.fotoFile && !this.form.foto_url) { alert('A foto do casal é obrigatória.'); return; }
                    this.enviando = true;
                    try {
                        const fd = new FormData();
                        const campos = {
                            ...this.form,
                            possui_carro_tio: this.form.possui_carro ? 1 : 0,
                            possui_carro_tia: this.form.possui_carro ? 1 : 0,
                            detalhes_restricao_tio: JSON.stringify(this.normalizarRestricoes(this.form.detalhes_restricao_tio)),
                            detalhes_restricao_tia: JSON.stringify(this.normalizarRestricoes(this.form.detalhes_restricao_tia))
                        };
                        for (const [k, v] of Object.entries(campos)) {
                            if (v !== null && v !== undefined) fd.append(k, v);
                        }
                        if (this.fotoFile) fd.append('foto', this.fotoFile);
                        const res = await fetch(`/api/atualizacoes-cadastro-public/tios/${encodeURIComponent(this.token)}`, { method: 'POST', body: fd });
                        const data = await res.json().catch(() => ({}));
                        if (!res.ok) throw new Error(data.error || 'Erro ao salvar.');
                        this.sucesso = true;
                    } catch (err) { alert(err.message || 'Erro ao salvar.'); }
                    finally { this.enviando = false; }
                }
            },
            watch: {
                'form.restricao_alimentar_tio'(valor) {
                    if (!valor) { this.form.detalhes_restricao_tio = []; this.buscaRestricaoTio = ''; }
                },
                'form.restricao_alimentar_tia'(valor) {
                    if (!valor) { this.form.detalhes_restricao_tia = []; this.buscaRestricaoTia = ''; }
                }
            },
            mounted() { this.carregar(); }
        }).mount('#app');
    </script>
</body>
</html>
