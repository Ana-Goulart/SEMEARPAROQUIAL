<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links de atualização da equipe</title>
    <link rel="icon" type="image/png" href="/assets/logo-oficial.png">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/velzon-theme.css">
    <style>
        body {
            background: #f7f2e8;
            color: #172033;
        }
        .page-shell {
            width: min(1040px, 100%);
            margin: 0 auto;
            padding: 20px 14px 42px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }
        .brand img {
            width: 44px;
            height: 44px;
            object-fit: contain;
        }
        .panel {
            background: #fffdf8;
            border: 1px solid rgba(31, 53, 88, 0.08);
            border-radius: 8px;
            box-shadow: 0 18px 48px rgba(31, 53, 88, 0.08);
            padding: 18px;
        }
        .summary-chip {
            display: inline-flex;
            gap: 6px;
            align-items: center;
            border: 1px solid rgba(34, 55, 80, 0.14);
            border-radius: 999px;
            padding: 7px 12px;
            background: #eef3f8;
            color: #223750;
            font-weight: 700;
        }
        .links-table th {
            color: #223750;
            font-weight: 700;
            white-space: nowrap;
        }
        .links-table td {
            vertical-align: middle;
        }
        .copy-link-btn {
            border-color: rgba(34, 55, 80, 0.32);
            color: #223750;
            font-weight: 600;
        }
        .copy-link-btn:hover,
        .copy-link-btn:focus {
            background: #223750;
            border-color: #223750;
            color: #fff;
        }
        .copy-feedback {
            display: inline-flex;
            align-items: center;
            margin-left: 8px;
            color: #18794e;
            font-size: 0.82rem;
            font-weight: 700;
            white-space: nowrap;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 82px;
            border: 1px solid transparent;
            border-radius: 999px;
            padding: 5px 10px;
            font-size: 0.78rem;
            font-weight: 700;
            line-height: 1;
        }
        .status-badge-pendente {
            border-color: rgba(34, 55, 80, 0.14);
            background: #eef3f8;
            color: #223750;
        }
        .status-badge-atualizado {
            border-color: rgba(24, 121, 78, 0.2);
            background: #e8f6ef;
            color: #18794e;
        }
        @media (min-width: 768px) {
            .page-shell {
                padding-top: 34px;
            }
            .panel {
                padding: 26px;
            }
        }
    </style>
</head>
<body>
    <div id="app" class="page-shell">
        <div class="brand">
            <img src="/assets/logo-oficial.png" alt="Semear Paroquial">
            <div>
                <div class="fw-bold">SEMEAR PAROQUIAL</div>
                <div class="text-muted small">Atualização cadastral</div>
            </div>
        </div>

        <div class="panel">
            <div v-if="loading" class="text-center py-5">
                <div class="spinner-border text-primary"></div>
            </div>
            <div v-else-if="erro" class="alert alert-warning mb-0">{{ erro }}</div>
            <template v-else>
                <div class="d-flex flex-column flex-md-row justify-content-between gap-3 mb-4">
                    <div>
                        <h1 class="h4 mb-1">Equipe: {{ equipe.nome }}</h1>
                        <div class="text-muted">Montagem/Edição: {{ equipe.numero_ejc || '-' }} EJC</div>
                    </div>
                    <div class="d-flex flex-wrap gap-2">
                        <span class="summary-chip">Total: {{ total }}</span>
                        <span class="summary-chip">Atualizados: {{ atualizados }}</span>
                        <span class="summary-chip">{{ percentual }}%</span>
                    </div>
                </div>

                <div v-if="!membros.length" class="text-muted text-center py-4">Nenhum membro encontrado nesta equipe.</div>
                <div v-else class="table-responsive">
                    <table class="table table-hover align-middle links-table">
                        <thead>
                            <tr>
                                <th>Nome do jovem</th>
                                <th>Telefone</th>
                                <th>Link</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-for="m in membros" :key="chaveMembro(m)">
                                <td class="fw-semibold">{{ m.nome_completo }}</td>
                                <td>{{ m.telefone || '-' }}</td>
                                <td>
                                    <button class="btn btn-sm copy-link-btn" type="button" @click="copiar(m)">Copiar link</button>
                                    <span v-if="linkCopiado === chaveMembro(m)" class="copy-feedback">Link copiado</span>
                                </td>
                                <td>
                                    <span class="status-badge" :class="m.atualizado ? 'status-badge-atualizado' : 'status-badge-pendente'">
                                        {{ m.atualizado ? 'Atualizado' : 'Pendente' }}
                                    </span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </template>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    loading: true,
                    erro: '',
                    equipe: {},
                    membros: [],
                    total: 0,
                    atualizados: 0,
                    percentual: 0,
                    linkCopiado: '',
                    feedbackTimer: null
                };
            },
            methods: {
                token() {
                    return window.location.pathname.split('/').filter(Boolean).pop() || '';
                },
                async carregar() {
                    this.loading = true;
                    this.erro = '';
                    try {
                        const res = await fetch(`/api/atualizacoes-cadastro-public/equipe/${encodeURIComponent(this.token())}`);
                        const data = await res.json().catch(() => ({}));
                        if (!res.ok) throw new Error(data.error || 'Link inválido.');
                        this.equipe = data.equipe || {};
                        this.membros = Array.isArray(data.membros) ? data.membros : [];
                        this.total = Number(data.total || 0);
                        this.atualizados = Number(data.atualizados || 0);
                        this.percentual = Number(data.percentual || 0);
                    } catch (err) {
                        this.erro = err.message || 'Não foi possível carregar os links.';
                    } finally {
                        this.loading = false;
                    }
                },
                async copiar(membro) {
                    const link = membro.link;
                    try {
                        await navigator.clipboard.writeText(link);
                        this.mostrarFeedbackCopiado(membro);
                    } catch (_) {
                        window.prompt('Copie o link:', link);
                        this.mostrarFeedbackCopiado(membro);
                    }
                },
                mostrarFeedbackCopiado(membro) {
                    this.linkCopiado = this.chaveMembro(membro);
                    if (this.feedbackTimer) clearTimeout(this.feedbackTimer);
                    this.feedbackTimer = setTimeout(() => {
                        this.linkCopiado = '';
                        this.feedbackTimer = null;
                    }, 2500);
                },
                chaveMembro(m) {
                    return `${m.tipo || 'JOVEM'}-${m.jovem_id || m.casal_id || m.nome_completo}`;
                }
            },
            mounted() {
                this.carregar();
            }
        }).mount('#app');
    </script>
</body>
</html>
