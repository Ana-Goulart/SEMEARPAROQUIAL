<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJC - Espaços da Igreja</title>
    <link rel="icon" type="image/png" href="/assets/logo-oficial.png">
    <link rel="apple-touch-icon" href="/assets/logo-oficial.png">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/css/velzon-theme.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/ui-kit.js"></script>
    <script src="/js/menu.js"></script>
</head>

<body>
    <div id="app">
        <main class="container-fluid">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <div class="d-flex flex-wrap justify-content-between align-items-center mb-3">
                        <div>
                            <h3 class="mb-1">Espaços da Igreja</h3>
                            <p class="text-muted mb-0">Cadastre os espaços que podem ser usados nos eventos.</p>
                        </div>
                        <button class="btn btn-primary" @click="abrirModal">Adicionar espaço</button>
                    </div>

                    <div v-if="!espacos.length" class="alert alert-light border mb-0">
                        <div class="fw-semibold mb-1">Nenhum espaço cadastrado</div>
                        <div class="text-muted">Clique em “Adicionar espaço” para começar.</div>
                    </div>

                    <div v-else class="table-responsive">
                        <table class="table table-bordered align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Nome</th>
                                    <th>Local</th>
                                    <th>Observação</th>
                                    <th style="width: 120px;">Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr v-for="(e, idx) in espacos" :key="e.id">
                                    <td class="fw-semibold">{{ e.nome }}</td>
                                    <td>{{ e.local || '-' }}</td>
                                    <td>{{ e.observacao || '-' }}</td>
                                    <td>
                                        <div class="d-flex gap-2">
                                            <button class="btn btn-edit-standard btn-sm" @click="editarEspaco(e)">
                                                Editar
                                            </button>
                                            <button class="btn btn-sm btn-outline-danger" @click="removerEspaco(idx)">
                                                Excluir
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <div class="modal fade" id="modalEspaco" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">{{ form.id ? 'Editar espaço' : 'Adicionar espaço' }}</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                    </div>
                    <div class="modal-body">
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label">Nome *</label>
                                <input type="text" class="form-control" v-model="form.nome"
                                    placeholder="Ex: Salão paroquial">
                            </div>
                            <div class="col-6">
                                <label class="form-label">Local</label>
                                <input type="text" class="form-control" v-model="form.local"
                                    placeholder="Ex: Centro comunitário">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Observação</label>
                                <textarea class="form-control" rows="3" v-model="form.observacao"
                                    placeholder="Ex: possui projetor e ar-condicionado"></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-primary" @click="salvarEspaco">Salvar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            injetarMenu('#app');
            ativarMenu('/planejamento/espacos');

            const { createApp } = Vue;
            createApp({
                data() {
                    return {
                        espacos: [],
                        form: {
                            id: null,
                            nome: '',
                            local: '',
                            observacao: ''
                        }
                    };
                },
                mounted() {
                    this.carregar();
                    window.addEventListener('meu-ejc-atualizado', this.carregar);
                },
                beforeUnmount() {
                    window.removeEventListener('meu-ejc-atualizado', this.carregar);
                },
                methods: {
                    storageKey() {
                        const tenantId = window.__TENANT_ID ? `tenant_${window.__TENANT_ID}` : null;
                        const nomeEjc = (window.__NOME_EJC_ATUAL && String(window.__NOME_EJC_ATUAL).trim())
                            ? String(window.__NOME_EJC_ATUAL).trim().toLowerCase().replace(/[^a-z0-9]+/gi, '_')
                            : 'ejc';
                        return `espacosIgreja_${tenantId || nomeEjc}`;
                    },
                    carregar() {
                        try {
                            const raw = localStorage.getItem(this.storageKey());
                            this.espacos = raw ? JSON.parse(raw) : [];
                        } catch (_) {
                            this.espacos = [];
                        }
                    },
                    salvarLocal() {
                        localStorage.setItem(this.storageKey(), JSON.stringify(this.espacos));
                    },
                    abrirModal() {
                        this.form = { id: null, nome: '', local: '', observacao: '' };
                        const modal = new bootstrap.Modal(document.getElementById('modalEspaco'));
                        modal.show();
                    },
                    editarEspaco(espaco) {
                        this.form = { ...espaco };
                        const modal = new bootstrap.Modal(document.getElementById('modalEspaco'));
                        modal.show();
                    },
                    salvarEspaco() {
                        if (!this.form.nome) {
                            uiAlert('Nome é obrigatório.');
                            return;
                        }
                        if (this.form.id) {
                            const idx = this.espacos.findIndex(e => e.id === this.form.id);
                            if (idx >= 0) this.espacos.splice(idx, 1, { ...this.form });
                        } else {
                            this.espacos.push({ ...this.form, id: String(Date.now()) });
                        }
                        this.salvarLocal();
                        bootstrap.Modal.getInstance(document.getElementById('modalEspaco'))?.hide();
                    },
                    async removerEspaco(idx) {
                        if (!(await uiConfirm('Remover este espaço?'))) return;
                        this.espacos.splice(idx, 1);
                        this.salvarLocal();
                    }
                }
            }).mount('#app');
        });
    </script>
</body>

</html>
